<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINS Portal - Saved Items</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .saved-grid { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
        .saved-item-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.2s ease;
        }
        .saved-item-card:hover { border-color: var(--accent-color); }
        .remove-bookmark-btn { 
            background: var(--badge-critical-bg); 
            color: var(--badge-critical-txt); 
            border: 1px solid transparent; 
            padding: 0.5rem 1rem; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem; 
        }
        .remove-bookmark-btn:hover { border-color: var(--badge-critical-txt); }
        .empty-notice { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav class="global-nav">
        <div class="nav-container">
            <h2 class="nav-brand">🚀 VINS Support Hub</h2>
            <div class="nav-right-block">
                <div class="nav-links">
                    <a href="intro.html">Getting Started</a>
                    <a href="index.html">Browse FAQs</a>
                    <a href="assistant.html">AI Assistant</a>
                    <a href="saved.html" class="active">Saved Items</a>
                    <a href="dashboard.html">Analytics</a>
                    <a href="admin.html">Admin</a>
                </div>
                <div class="theme-toggle-wrapper">
                    <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle Theme"></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h2>Your Bookmarked Rules Ledger</h2>
        <div id="savedGrid" class="saved-grid"></div>
    </div>

    <script>
        function renderBookmarks() {
            const grid = document.getElementById("savedGrid");
            const bookmarks = JSON.parse(localStorage.getItem("vins_bookmarks")) || [];

            if (bookmarks.length === 0) {
                grid.innerHTML = `<div class="empty-notice">📂 No bookmarked rules found. Go to the FAQ Browser page and pin rules to see them here!</div>`;
                return;
            }

            grid.innerHTML = "";
            bookmarks.forEach((item, index) => {
                const card = document.createElement("div");
                card.className = "saved-item-card";
                card.innerHTML = `
                    <div>
                        <span class="status-badge-pill badge-nominal" style="margin-bottom: 0.5rem;">${item.cat}</span>
                        <h3 style="margin: 0.25rem 0; font-size: 1.1rem; color: var(--text-main);">${item.q}</h3>
                        <p style="margin: 0; font-size: 0.92rem; color: var(--text-muted);">${item.a}</p>
                    </div>
                    <button class="remove-bookmark-btn" onclick="deleteBookmark(${index})">Remove</button>
                `;
                grid.appendChild(card);
            });
        }

        window.deleteBookmark = function(index) {
            let bookmarks = JSON.parse(localStorage.getItem("vins_bookmarks")) || [];
            bookmarks.splice(index, 1);
            localStorage.setItem("vins_bookmarks", JSON.stringify(bookmarks));
            renderBookmarks();
        };

        document.addEventListener("DOMContentLoaded", renderBookmarks);
    </script>
    <script src="theme.js"></script>
</body>
</html>
