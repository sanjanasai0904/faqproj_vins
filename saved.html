<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINS Portal - Saved Items</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .saved-grid { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
        .faq-accordion-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s ease;
        }
        .faq-accordion-card:hover { border-color: var(--text-muted); }
        .faq-accordion-trigger {
            width: 100%;
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            outline: none;
        }
        .faq-accordion-icon {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: transform 0.2s ease;
            margin-left: 1rem;
            flex-shrink: 0;
        }
        .faq-accordion-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.01);
        }
        .faq-accordion-content {
            padding: 0 1.25rem 1.25rem 1.25rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .faq-action-row {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end;
        }
        .faq-accordion-card.is-expanded {
            border-color: var(--accent-color);
        }
        .faq-accordion-card.is-expanded .faq-accordion-icon {
            transform: rotate(180deg);
            color: var(--accent-color);
        }
        .remove-bookmark-btn { 
            background: var(--badge-critical-bg); 
            color: var(--badge-critical-txt); 
            border: 1px solid transparent; 
            padding: 0.5rem 1rem; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem; 
        }
        .remove-bookmark-btn:hover { border-color: var(--badge-critical-txt); }
        .empty-notice { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav class="global-nav">
        <div class="nav-container">
            <h2 class="nav-brand">🚀 VINS Support Hub</h2>
            <div class="nav-right-block">
                <div class="nav-links">
                    <a href="intro.html">Getting Started</a>
                    <a href="index.html">Browse FAQs</a>
                    <a href="assistant.html">AI Assistant</a>
                    <a href="saved.html" class="active">Saved Items</a>
                    <a href="dashboard.html">Analytics</a>
                    <a href="admin.html">Admin</a>
                </div>
                <div class="theme-toggle-wrapper">
                    <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle Theme"></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h2>Your Bookmarked Rules Ledger</h2>
        <div id="savedGrid" class="saved-grid"></div>
    </div>

    <script>
        const SAVED_FAQS_KEY = "savedFaqs";

        function readSavedFaqs() {
            try {
                const rawValue = localStorage.getItem(SAVED_FAQS_KEY);
                if (!rawValue) return [];

                const parsedValue = JSON.parse(rawValue);
                return Array.isArray(parsedValue) ? parsedValue : [];
            } catch (error) {
                return [];
            }
        }

        function writeSavedFaqs(savedFaqs) {
            try {
                localStorage.setItem(SAVED_FAQS_KEY, JSON.stringify(savedFaqs));
                return true;
            } catch (error) {
                return false;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text || "";
            return div.innerHTML;
        }

        function renderBookmarks() {
            const grid = document.getElementById("savedGrid");
            const bookmarks = readSavedFaqs();

            if (bookmarks.length === 0) {
                grid.innerHTML = `<div class="empty-notice">No saved FAQs yet.</div>`;
                return;
            }

            grid.innerHTML = "";
            bookmarks.forEach((item) => {
                const card = document.createElement("div");
                card.className = "faq-accordion-card is-expanded";
                card.innerHTML = `
                    <button class="faq-accordion-trigger" aria-expanded="true" onclick="toggleSavedAccordion(this)">
                        <span>${escapeHtml(item.question)}</span>
                        <span class="faq-accordion-icon">▼</span>
                    </button>
                    <div class="faq-accordion-panel">
                        <div class="faq-accordion-content">
                            ${item.category ? `<span class="status-badge-pill badge-nominal" style="margin-bottom: 0.75rem;">${escapeHtml(item.category)}</span>` : ""}
                            <p style="margin:0;">${escapeHtml(item.answer)}</p>
                            <div class="faq-action-row">
                                <button class="remove-bookmark-btn" data-faq-id="${escapeHtml(String(item.id))}" onclick="deleteBookmark(this.dataset.faqId)">★ Unsave</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);

                const panel = card.querySelector(".faq-accordion-panel");
                panel.style.maxHeight = panel.scrollHeight + "px";
            });
        }

        function toggleSavedAccordion(triggerBtn) {
            const card = triggerBtn.closest(".faq-accordion-card");
            const panel = card.querySelector(".faq-accordion-panel");
            const shouldExpand = !card.classList.contains("is-expanded");

            card.classList.toggle("is-expanded", shouldExpand);
            triggerBtn.setAttribute("aria-expanded", String(shouldExpand));
            panel.style.maxHeight = shouldExpand ? panel.scrollHeight + "px" : "0";
        }

        window.deleteBookmark = function(id) {
            const updatedBookmarks = readSavedFaqs().filter(item => String(item.id) !== String(id));
            if (writeSavedFaqs(updatedBookmarks)) {
                renderBookmarks();
            }
        };

        window.addEventListener("storage", event => {
            if (event.key === SAVED_FAQS_KEY) {
                renderBookmarks();
            }
        });

        window.addEventListener("focus", renderBookmarks);
        document.addEventListener("DOMContentLoaded", renderBookmarks);
    </script>
    <script src="theme.js"></script>
</body>
</html>
